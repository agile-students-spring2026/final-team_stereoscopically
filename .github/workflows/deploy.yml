name: CD

on:
  push:
    branches: [main, master]

  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# GitHub does not allow `secrets.*` inside workflow `if:` (job or step). Gate via a step output instead.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy enabled
        id: gate
        env:
          DROPLET_DEPLOY_ENABLED: ${{ secrets.DROPLET_DEPLOY_ENABLED }}
        run: |
          if [ "$DROPLET_DEPLOY_ENABLED" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'

      - name: Deploy via SSH
        if: steps.gate.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.6
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            cd "${{ secrets.DROPLET_APP_PATH }}"
            git pull --ff-only
            docker compose up -d --build
